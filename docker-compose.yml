services:
  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - CHOKIDAR_USEPOLLING=true
  server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
